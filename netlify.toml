[build]
  command = "npm run build"
  publish = "build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NODE_VERSION = "18"
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_VERSION = "18"
  NODE_ENV = "production"

[context.branch-deploy.environment]
  NODE_VERSION = "18"
  NODE_ENV = "production"
